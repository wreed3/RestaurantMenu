<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Restaurant Menu Manager</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>🍽️ Restaurant Menu Manager</h1>
            <p class="subtitle">Manage your restaurant's menu with ease</p>
        </header>

        <nav class="main-nav">
            <button class="nav-btn active" data-view="all">📋 All Items</button>
            <button class="nav-btn" data-view="category">🏷️ By Category</button>
            <button class="nav-btn" data-view="search">🔍 Search</button>
            <button class="nav-btn" data-view="add">➕ Add Item</button>
        </nav>

        <div class="actions-bar">
            <button class="action-btn" id="importCsvBtn">📥 Import CSV</button>
            <button class="action-btn" id="exportCsvBtn">📤 Export CSV</button>
            <button class="action-btn danger" id="clearAllBtn">🗑️ Clear All</button>
            <input type="file" id="csvFileInput" accept=".csv" style="display: none;">
        </div>

        <!-- All Items View -->
        <section id="allItemsView" class="view active">
            <div class="view-header">
                <h2>All Menu Items</h2>
                <span class="item-count" id="totalCount">0 items</span>
            </div>
            <div id="menuItemsContainer" class="menu-grid"></div>
        </section>

        <!-- Category View -->
        <section id="categoryView" class="view">
            <div class="view-header">
                <h2>Browse by Category</h2>
                <select id="categorySelect" class="category-select">
                    <option value="">Select a category...</option>
                    <option value="Appetizer">🥟 Appetizers</option>
                    <option value="Main Course">🍖 Main Courses</option>
                    <option value="Dessert">🍰 Desserts</option>
                    <option value="Beverage">☕ Beverages</option>
                </select>
            </div>
            <div id="categoryItemsContainer" class="menu-grid"></div>
        </section>

        <!-- Search View -->
        <section id="searchView" class="view">
            <div class="view-header">
                <h2>Search Menu</h2>
                <input type="text" id="searchInput" class="search-input" placeholder="Type to search...">
            </div>
            <div id="searchResultsContainer" class="menu-grid"></div>
        </section>

        <!-- Add/Edit Item View -->
        <section id="addItemView" class="view">
            <div class="view-header">
                <h2 id="formTitle">Add New Item</h2>
            </div>
            <form id="itemForm" class="item-form">
                <input type="hidden" id="editIndex" value="">
                
                <div class="form-group">
                    <label for="itemName">Item Name *</label>
                    <input type="text" id="itemName" required placeholder="e.g., Grilled Salmon">
                </div>

                <div class="form-group">
                    <label for="itemDescription">Description *</label>
                    <textarea id="itemDescription" required placeholder="Describe the dish..." rows="3"></textarea>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="itemPrice">Price ($) *</label>
                        <input type="number" id="itemPrice" step="0.01" min="0" required placeholder="0.00">
                    </div>

                    <div class="form-group">
                        <label for="itemCategory">Category *</label>
                        <select id="itemCategory" required>
                            <option value="">Select...</option>
                            <option value="Appetizer">Appetizer</option>
                            <option value="Main Course">Main Course</option>
                            <option value="Dessert">Dessert</option>
                            <option value="Beverage">Beverage</option>
                        </select>
                    </div>
                </div>

                <div class="form-actions">
                    <button type="submit" class="btn btn-primary" id="submitBtn">Add Item</button>
                    <button type="button" class="btn btn-secondary" id="cancelBtn">Cancel</button>
                </div>
            </form>
        </section>
    </div>

    <!-- Modal for confirmations -->
    <div id="modal" class="modal">
        <div class="modal-content">
            <h3 id="modalTitle">Confirm Action</h3>
            <p id="modalMessage"></p>
            <div class="modal-actions">
                <button class="btn btn-danger" id="modalConfirm">Confirm</button>
                <button class="btn btn-secondary" id="modalCancel">Cancel</button>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
